<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de CV by XptoAY - Gerador de Senhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <!-- Firebase Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configurações Globais
        const MASTER_SALT = 'XPTOAY_BITOCA_2026';
        const LICENSE_STORAGE_KEY = 'xptoay_app_license';
        let firebaseConfig = {};
        let appId = 'xpto-cv-analyzer-prod';

        // Tenta carregar configurações do ambiente Canvas
        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }
            if (typeof __app_id !== 'undefined') {
                appId = __app_id;
            }
        } catch (e) { console.warn("Ambiente externo detectado ou erro na config."); }

        let app, auth, db;
        if (firebaseConfig.apiKey) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        // --- FUNÇÕES DE SEGURANÇA EXPOSTAS ---
        window.generateKey = (name) => {
            if (!name) return null;
            const cleanName = name.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
            if (!cleanName) return null;
            const hash = CryptoJS.HmacSHA256(cleanName, MASTER_SALT).toString().substring(0, 8).toUpperCase();
            return `XPTO-${cleanName}-${hash}`;
        };

        window.validateKeyFormat = (key) => {
            if (!key || !key.startsWith('XPTO-')) return false;
            const parts = key.split('-');
            if (parts.length !== 3) return false;
            const userId = parts[1];
            const expectedHash = CryptoJS.HmacSHA256(userId, MASTER_SALT).toString().substring(0, 8).toUpperCase();
            return parts[2] === expectedHash;
        };

        // --- LÓGICA DE ATIVAÇÃO ---
        window.handleActivation = async () => {
            const btn = document.getElementById('activate-btn');
            const input = document.getElementById('license-key-input');
            const errorMsg = document.getElementById('license-error');
            const key = input.value.trim().toUpperCase();

            if (!key) return;
            btn.disabled = true;
            btn.innerHTML = 'VALIDANDO...';

            // 1. Validação Matemática (Offline)
            if (!window.validateKeyFormat(key)) {
                errorMsg.innerText = "Chave com formato inválido.";
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = "ATIVAR LICENÇA";
                return;
            }

            // 2. Registro no Firebase (Online) se disponível
            if (db && auth && auth.currentUser) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'licenses', key);
                    const snap = await getDoc(docRef);
                    
                    if (snap.exists() && snap.data().deviceId !== auth.currentUser.uid) {
                        errorMsg.innerText = "Esta chave já está vinculada a outro dispositivo.";
                        errorMsg.classList.remove('hidden');
                        btn.disabled = false;
                        btn.innerHTML = "ATIVAR LICENÇA";
                        return;
                    }

                    await setDoc(docRef, {
                        key,
                        deviceId: auth.currentUser.uid,
                        activatedAt: new Date().toISOString()
                    }, { merge: true });

                } catch (e) {
                    console.error("Erro Firebase:", e);
                }
            }

            // Sucesso (Offline ou Online)
            localStorage.setItem(LICENSE_STORAGE_KEY, key);
            document.getElementById('lock-screen').classList.add('hidden');
            window.showToast?.("Acesso Liberado!");
        };

        // Inicialização de Auth
        if (auth) {
            onAuthStateChanged(auth, async (user) => {
                const savedKey = localStorage.getItem(LICENSE_STORAGE_KEY);
                if (savedKey && window.validateKeyFormat(savedKey)) {
                    document.getElementById('lock-screen').classList.add('hidden');
                }
            });

            const startAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            startAuth();
        } else {
            // Se não houver Firebase, libera se tiver chave salva
            const savedKey = localStorage.getItem(LICENSE_STORAGE_KEY);
            if (savedKey && window.validateKeyFormat(savedKey)) {
                document.getElementById('lock-screen').classList.add('hidden');
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #fff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

    <!-- TELA DE BLOQUEIO -->
    <div id="lock-screen" class="fixed inset-0 z-[100] bg-white/90 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl border border-gray-100 max-w-sm w-full text-center animate-fade-in">
            <div class="bg-blue-900 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Ativar Software</h2>
            <p class="text-xs text-gray-400 mb-6">Insira sua licença XptoAY para continuar.</p>
            
            <input type="text" id="license-key-input" class="w-full p-4 border-2 border-gray-100 rounded-xl mb-4 text-center font-mono text-sm focus:border-blue-900 outline-none uppercase tracking-widest" placeholder="XPTO-NOME-HASH">
            
            <button id="activate-btn" onclick="handleActivation()" class="w-full bg-blue-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                ATIVAR LICENÇA
            </button>
            
            <p id="license-error" class="text-red-500 text-[10px] mt-4 font-bold hidden italic uppercase">Chave Inválida</p>
        </div>
    </div>

    <!-- PAINEL ADMIN (BOTÃO E MODAL) -->
    <button onclick="toggleAdmin()" class="fixed bottom-4 right-4 bg-gray-800 text-white p-3 rounded-full shadow-lg z-[110] text-[10px] font-bold hover:bg-blue-900 transition-all uppercase tracking-tighter">
        Admin
    </button>

    <div id="admin-panel" class="fixed inset-0 z-[120] bg-black/50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-fade-in">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-blue-900 uppercase text-xs tracking-widest">Gerador de Licenças</h3>
                <button onclick="toggleAdmin()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Nome/ID do Cliente</label>
                    <div class="flex gap-2">
                        <input type="text" id="admin-user-id" class="flex-grow p-3 border rounded-xl text-xs outline-none focus:border-blue-900 uppercase font-mono" placeholder="CLIENTE01">
                        <button onclick="uiGenerateKey()" class="bg-blue-900 text-white px-6 py-3 rounded-xl text-[10px] font-bold uppercase active:scale-95">Gerar</button>
                    </div>
                </div>

                <div id="key-result-box" class="hidden p-4 bg-blue-50 border-2 border-dashed border-blue-200 rounded-2xl">
                    <p class="text-[9px] font-bold text-blue-400 uppercase mb-2">Chave Gerada:</p>
                    <div class="flex items-center justify-between">
                        <code id="display-key" class="text-sm font-bold text-blue-900 tracking-widest"></code>
                        <button onclick="copyKey()" class="bg-blue-200 text-blue-700 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase">Copiar</button>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <button onclick="forceReset()" class="text-[10px] text-red-500 font-bold uppercase hover:underline">Remover Licença desta Máquina</button>
                </div>
            </div>
        </div>
    </div>

    <!-- UI PRINCIPAL -->
    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Análise de CV <sup class="text-blue-900 text-[10px] font-black uppercase">by XptoAY</sup></h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Inteligência Artificial & Privacidade</p>
            </div>
            <div class="w-12 h-12 bg-blue-900 rounded-xl flex items-center justify-center text-white font-bold text-xs">XPTO</div>
        </header>

        <main class="bg-white rounded-3xl shadow-xl border border-gray-100 p-6">
            <div class="space-y-6">
                <!-- Requisitos -->
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-2">Perfil Desejado</label>
                    <textarea id="job-desc" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl text-xs min-h-[100px] outline-none focus:ring-2 focus:ring-blue-900/10 transition-all" placeholder="Quais competências você busca?"></textarea>
                </div>

                <!-- Upload -->
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="p-4 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center hover:border-blue-900 transition-all group">
                        <input type="file" id="cv-upload" class="hidden" accept=".pdf">
                        <button onclick="document.getElementById('cv-upload').click()" class="text-xs font-bold text-gray-600 group-hover:text-blue-900">Selecionar PDF do Candidato</button>
                        <p id="file-name" class="text-[10px] text-blue-500 mt-2 font-mono truncate max-w-full"></p>
                    </div>
                    
                    <button onclick="runAnalysis()" class="bg-blue-900 text-white rounded-2xl font-bold uppercase text-xs tracking-widest hover:bg-black transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2">
                        <span>Iniciar Análise</span>
                        <div id="loader" class="spinner hidden"></div>
                    </button>
                </div>

                <div id="results-area" class="hidden animate-fade-in border-t pt-8">
                    <div class="bg-blue-50 rounded-2xl p-6 text-center mb-6">
                        <p class="text-[10px] font-bold text-blue-900 uppercase mb-1">Match Score</p>
                        <h2 id="final-score" class="text-5xl font-black text-blue-900">0%</h2>
                    </div>
                    <div id="summary" class="text-xs text-gray-600 leading-relaxed bg-gray-50 p-6 rounded-2xl"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-[200] bg-black text-white px-6 py-3 rounded-full text-[10px] font-bold uppercase hidden animate-fade-in"></div>

    <script>
        // Funções de Interface
        window.toggleAdmin = () => {
            const el = document.getElementById('admin-panel');
            el.classList.toggle('hidden');
        };

        window.uiGenerateKey = () => {
            const id = document.getElementById('admin-user-id').value;
            const key = window.generateKey(id);
            if (key) {
                document.getElementById('key-result-box').classList.remove('hidden');
                document.getElementById('display-key').innerText = key;
                showToast("Licença gerada com sucesso!");
            } else {
                showToast("Insira um nome válido");
            }
        };

        window.copyKey = () => {
            const key = document.getElementById('display-key').innerText;
            const temp = document.createElement('input');
            temp.value = key;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            showToast("Chave copiada!");
        };

        window.forceReset = () => {
            if(confirm("Deseja realmente remover a licença e bloquear o app?")) {
                localStorage.removeItem('xptoay_app_license');
                location.reload();
            }
        };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        };

        // Simulação de Análise
        window.runAnalysis = () => {
            const loader = document.getElementById('loader');
            const results = document.getElementById('results-area');
            
            loader.classList.remove('hidden');
            setTimeout(() => {
                loader.classList.add('hidden');
                results.classList.remove('hidden');
                document.getElementById('final-score').innerText = "85%";
                document.getElementById('summary').innerText = "O candidato possui excelente fit cultural e técnico, com destaque para a experiência anterior reportada, apesar de estar em ambiente anonimizado.";
                results.scrollIntoView({ behavior: 'smooth' });
            }, 2000);
        };

        document.getElementById('cv-upload').onchange = (e) => {
            if(e.target.files[0]) {
                document.getElementById('file-name').innerText = e.target.files[0].name;
            }
        };
    </script>
</body>
</html>
